<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KnickHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- AUTH -->
<div id="authPage">
  <div class="auth-box">
    <h2>KnickHub</h2>

    <div id="loginForm">
      <input id="loginEmail" placeholder="Email">
      <input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p onclick="showRegister()">Create Account</p>
    </div>

    <div id="registerForm" style="display:none;">
      <input id="regName" placeholder="Name">
      <input id="regEmail" placeholder="Email">
      <input id="regPassword" type="password" placeholder="Password">
      <button onclick="register()">Register</button>
      <p onclick="showLogin()">Back</p>
    </div>
  </div>
</div>

<!-- HOME -->
<div id="homePage" style="display:none;">

  <div class="navbar">
    <span id="welcomeUser"></span>
    <div id="notifications"></div>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- LEFT -->
    <div class="sidebar">
      <img id="profilePic" class="avatar">
      <input type="file" id="profileUpload">

      <textarea id="bio" placeholder="Bio"></textarea>
      <button onclick="updateProfile()">Save</button>

      <h3>Friend Requests</h3>
      <div id="friendRequests"></div>

      <h3>Friends</h3>
      <div id="friendsList"></div>

      <input id="addFriendUID" placeholder="Friend UID">
      <button onclick="sendFriendRequest()">Add</button>
    </div>

    <!-- CENTER -->
    <div class="feed-area">
      <textarea id="postText" placeholder="Post..."></textarea>
      <button onclick="createPost()">Post</button>

      <input type="file" id="storyUpload">
      <button onclick="addStory()">My Day</button>

      <div id="stories"></div>
      <div id="feed"></div>
    </div>

    <!-- RIGHT -->
    <div class="chat-sidebar">
      <h3>Global Chat</h3>
      <div id="globalChat" class="chat-box"></div>
      <div class="chat-input">
        <input id="globalMessage">
        <button onclick="sendGlobalMessage()">Send</button>
      </div>

      <h3>Private Chat</h3>
      <input id="chatUID" placeholder="Friend UID">

      <div id="privateChat" class="chat-box"></div>
      <div id="typingStatus"></div>

      <div class="chat-input">
        <input id="privateMessage">
        <button onclick="sendPrivateMessage()">Send</button>
      </div>

    </div>

  </div>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
