<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Is Unfair</title>
<link rel="stylesheet" href="style.css">
<script type="module" src="app.js" defer></script>
</head>
<body>

<!-- AUTH -->
<div id="authPage">
  <div class="auth-box">
    <h2>Life Is Unfair</h2>

    <!-- LOGIN -->
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
      <p onclick="showRegister()">Create Account</p>
      <p onclick="showForgot()">Forgot Password?</p>
    </div>

    <!-- REGISTER -->
    <div id="registerForm" class="hidden">
      <input type="text" id="regName" placeholder="Full Name">
      <input type="email" id="regEmail" placeholder="Email">
      <input type="password" id="regPassword" placeholder="Password">
      <button onclick="register()">Register</button>
      <p onclick="showLogin()">Back to Login</p>
    </div>

    <!-- FORGOT PASSWORD -->
    <div id="forgotFormContainer" class="hidden">
      <input type="email" id="forgotEmail" placeholder="Enter your email">
      <button onclick="forgotPassword()">Send Reset Link</button>
      <p onclick="showLogin()">Back to Login</p>
      <div class="message" id="forgotMessage">Check your email for reset instructions.</div>
    </div>

  </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="hidden">
  <div class="navbar">
    <h2>Life Is Unfair</h2>
    <span id="welcomeUser"></span>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="container">

    <!-- LEFT: Profile + Friends -->
    <div class="sidebar">
      <div class="profile-box">
        <img id="profilePic" class="avatar">
        <input type="file" id="profileUpload">
        <textarea id="bio" placeholder="Your bio"></textarea>
        <button onclick="updateProfile()">Save Profile</button>
      </div>

      <h3>Friend Requests</h3>
      <div id="friendRequests"></div>

      <h3>Friends</h3>
      <div id="friendsList"></div>

      <h3>Add Friend by UID</h3>
      <input id="addFriendUID" placeholder="Friend UID">
      <button onclick="sendFriendRequest()">Send Request</button>
    </div>

    <!-- CENTER: Feed -->
    <div class="feed-area">
      <div class="create-post">
        <textarea id="postText" placeholder="What's on your mind?"></textarea>
        <input type="file" id="postMedia">
        <button onclick="createPost()">Post</button>
      </div>
      <div class="stories" id="stories"></div>
      <div id="feed"></div>
    </div>

    <!-- RIGHT: Chat -->
    <div class="chat-sidebar">
      <h3>Global Chat</h3>
      <div id="globalChat" class="chat-box"></div>
      <input id="globalMessage" placeholder="Type message">
      <button onclick="sendGlobalMessage()">Send</button>

      <h3>Private Chat</h3>
      <input id="chatFriendUID" placeholder="Friend UID">
      <div id="privateChat" class="chat-box"></div>
      <input id="privateMessage" placeholder="Type message">
      <button onclick="sendPrivateMessage()">Send</button>
    </div>

  </div>
</div>

</body>
</html>
