<!DOCTYPE html>
<html>
<head>
<title>Login - Sunriseee</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<div class="container">

<h1>🌅 Sunriseee</h1>

<input type="email"
id="email"
placeholder="Email">

<input type="password"
id="password"
placeholder="Password">

<button onclick="login()">
Login
</button>

<a href="register.html">
Create Account
</a>

</div>

<script type="module">

import { app } from "../firebase.js";

import {
getAuth,
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const auth=getAuth(app);

window.login=function(){

signInWithEmailAndPassword(
auth,
email.value,
password.value
)

.then(()=>{

location.href="../index.html";

})

.catch(error=>{

alert(error.message);

});

};

</script>

</body>
</html>
